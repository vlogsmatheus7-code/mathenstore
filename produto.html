<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes | MTH STORE</title>
    <style>
        :root { --gold: #d4af37; --dark-bg: #050505; --card-bg: #111; }
        body { margin: 0; padding: 0; background-color: var(--dark-bg); color: white; font-family: 'Segoe UI', sans-serif; padding-bottom: 50px; }
        
        header { padding: 20px; border-bottom: 1px solid rgba(212, 175, 55, 0.2); display: flex; align-items: center; background: #000; }
        .btn-voltar { text-decoration: none; color: var(--gold); font-weight: bold; font-size: 1.5rem; margin-right: 20px; }
        .logo-sm { font-size: 1.2rem; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; }
        .logo-sm span { color: var(--gold); }

        .container { max-width: 600px; margin: 20px auto; padding: 0 15px; }

        .galeria-container { background: var(--card-bg); border-radius: 20px; padding: 15px; border: 1px solid #222; margin-bottom: 20px; }
        .foto-principal-box { width: 100%; height: 350px; display: flex; align-items: center; justify-content: center; overflow: hidden; border-radius: 12px; background: #000; margin-bottom: 15px; }
        .foto-principal { max-width: 100%; max-height: 100%; object-fit: contain; }
        
        .miniaturas-container { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 5px; }
        .miniatura { width: 65px; height: 65px; border-radius: 8px; border: 2px solid #333; cursor: pointer; object-fit: cover; opacity: 0.4; transition: 0.3s; flex-shrink: 0; }
        .miniatura.active { border-color: var(--gold); opacity: 1; }

        .detalhes-box { background: var(--card-bg); border-radius: 20px; padding: 25px; border: 1px solid #222; }
        .product-title { margin: 0 0 10px 0; font-size: 1.7rem; text-transform: uppercase; }
        .tag-gb-lg { display: inline-block; border: 1px solid var(--gold); color: var(--gold); font-size: 0.8rem; padding: 4px 12px; border-radius: 6px; font-weight: bold; margin-bottom: 15px; }
        
        .valor-lg { font-size: 2.2rem; font-weight: bold; color: white; display: block; margin: 5px 0 20px 0; }
        
        .pagamento-grid { border-top: 1px solid #222; padding-top: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .pag-item { font-size: 0.9rem; color: #bbb; display: flex; align-items: center; gap: 8px; }
        .juros-aviso { grid-column: span 2; font-size: 0.8rem; color: #ffa500; font-style: italic; margin-top: 10px; text-align: center; }

        .btn-add-cart { display: block; width: 100%; padding: 20px; background: var(--gold); color: black; border: none; border-radius: 40px; font-weight: bold; font-size: 1.2rem; cursor: pointer; margin-top: 30px; transition: 0.3s; }
        .btn-add-cart:hover { transform: scale(1.02); }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="btn-voltar">←</a>
    <div class="logo-sm">MTH <span>STORE</span></div>
</header>

<div class="container">
    <div class="galeria-container">
        <div class="foto-principal-box"><img id="fotoPrincipal" src="" class="foto-principal"></div>
        <div id="miniaturasContainer" class="miniaturas-container"></div>
    </div>

    <div class="detalhes-box">
        <h1 id="productTitle" class="product-title"></h1>
        <span id="tagGb" class="tag-gb-lg"></span>
        <span id="productPrice" class="valor-lg"></span>

        <div class="pagamento-grid">
            <div class="pag-item">✅ PIX (Desconto)</div>
            <div class="pag-item">💳 Crédito 12x</div>
            <div class="pag-item">💵 Dinheiro</div>
            <div class="pag-item">📱 Original Apple</div>
            <div class="juros-aviso">* No cartão, juros da maquininha por conta do comprador.</div>
        </div>

        <button onclick="addToCart()" class="btn-add-cart">Adicionar ao Carrinho</button>
    </div>
</div>

<script>
    const dadosProdutos = {
        '16promax': { nome: 'iPhone 16 Pro Max', gb: '512GB', preco: '5.400,00', fotos: ['https://store.storeimages.cdn-apple.com/4982/as-images.apple.com/is/iphone-16-pro-model-unselect-gallery-2-202409?wid=1000&fmt=p-jpg'] },
        '15promax': { nome: 'iPhone 15 Pro Max', gb: '512GB', preco: '4.400,00', fotos: ['https://store.storeimages.cdn-apple.com/4982/as-images.apple.com/is/iphone-15-pro-finish-select-202309-6-7inch-naturaltitanium?wid=1000&fmt=p-jpg'] },
        '14promax': { nome: 'iPhone 14 Pro Max', gb: '256GB', preco: '3.600,00', fotos: ['https://store.storeimages.cdn-apple.com/4982/as-images.apple.com/is/iphone-14-pro-finish-unselect-gallery-1-202209?wid=1000&fmt=p-jpg'] },
        '13promax': { nome: 'iPhone 13 Pro Max', gb: '256GB', preco: '3.100,00', fotos: ['https://store.storeimages.cdn-apple.com/4982/as-images.apple.com/is/iphone-13-pro-max-silver-select?wid=1000&fmt=p-jpg'] },
        '14plus': { nome: 'iPhone 14 Plus', gb: '128GB', preco: '2.500,00', fotos: ['https://store.storeimages.cdn-apple.com/4982/as-images.apple.com/is/iphone-14-finish-select-202209-6-7inch-starlight?wid=1000&fmt=p-jpg'] },
        'iphone13': { nome: 'iPhone 13', gb: '128GB', preco: '2.100,00', fotos: ['https://store.storeimages.cdn-apple.com/4982/as-images.apple.com/is/iphone-13-finish-select-202207-midnight?wid=1000&fmt=p-jpg'] }
    };

    function carregar() {
        const id = new URLSearchParams(window.location.search).get('id');
        const p = dadosProdutos[id] || dadosProdutos['16promax'];

        document.getElementById('productTitle').innerText = p.nome;
        document.getElementById('tagGb').innerText = p.gb;
        document.getElementById('productPrice').innerText = 'R$ ' + p.preco;
        
        const principal = document.getElementById('fotoPrincipal');
        const minis = document.getElementById('miniaturasContainer');
        principal.src = p.fotos[0];

        p.fotos.forEach((link, i) => {
            const img = document.createElement('img');
            img.src = link;
            img.className = 'miniatura' + (i === 0 ? ' active' : '');
            img.onclick = () => {
                principal.src = link;
                document.querySelectorAll('.miniatura').forEach(m => m.classList.remove('active'));
                img.classList.add('active');
            };
            minis.appendChild(img);
        });
    }

    function addToCart() {
        const id = new URLSearchParams(window.location.search).get('id');
        const p = dadosProdutos[id];
        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        cart.push({ nome: p.nome, preco: p.preco, gb: p.gb });
        localStorage.setItem('cart', JSON.stringify(cart));
        alert('Adicionado ao carrinho!');
        window.location.href = 'index.html';
    }
    window.onload = carregar;
</script>
</body>
</html>
