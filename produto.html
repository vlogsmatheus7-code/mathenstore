<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes | MTH STORE</title>
    <style>
        :root { --gold: #d4af37; }
        body { 
            margin: 0; background-image: url('fundo-preto-premium.jpg'); 
            background-attachment: fixed; background-size: cover;
            color: white; font-family: sans-serif; text-align: center;
        }
        .header-simple { padding: 30px; background: rgba(0,0,0,0.8); border-bottom: 1px solid var(--gold); }
        .product-card { 
            max-width: 500px; margin: 40px auto; background: rgba(15,15,15,0.9); 
            padding: 30px; border-radius: 20px; border: 1px solid var(--gold);
            backdrop-filter: blur(15px);
        }
        .product-img { width: 100%; border-radius: 15px; margin-bottom: 20px; }
        .buy-btn { 
            display: block; background: #25d366; color: white; padding: 20px; 
            text-decoration: none; border-radius: 40px; font-weight: bold; margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="header-simple">
        <a href="index.html"><img src="logo-dourado.png" width="120"></a>
    </div>
    <div class="product-card">
        <img id="p-img" class="product-img" src="">
        <h1 id="p-name">Carregando...</h1>
        <p id="p-price" style="font-size: 2rem; color: var(--gold); font-weight: bold;"></p>
        <a href="https://wa.me/5581985666394" class="buy-btn">Confirmar Pedido no WhatsApp</a>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        // Aqui podes adicionar a lógica para mudar a imagem/nome baseada no ID
        if(id === '16promax') {
            document.getElementById('p-name').innerText = "iPhone 16 Pro Max";
            document.getElementById('p-price').innerText = "R$ 5.400";
            document.getElementById('p-img').src = "https://store.storeimages.cdn-apple.com/4982/as-images.apple.com/is/iphone-16-pro-model-unselect-gallery-2-202409?wid=1000&fmt=p-jpg";
        }
    </script>
</body>
</html>
