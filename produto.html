<div class="detalhes-box">
    <h1 id="productTitle" class="product-title"></h1>
    <span id="tagGb" class="tag-gb-lg"></span>
    
    <div class="price-lg-box">
        <span class="price-label-lg">Valor à vista</span>
        <span id="productPrice" class="valor-lg"></span>
    </div>

    <div style="margin-top: 20px; border-top: 1px solid #222; padding-top: 15px;">
        <p style="font-size: 0.8rem; color: #888; margin-bottom: 10px;">FORMAS DE PAGAMENTO:</p>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 0.8rem;">
            <span>✅ PIX (Desconto)</span>
            <span>💳 Crédito em até 12x</span>
            <span>💵 Dinheiro</span>
            <span>🔄 Seu iPhone como entrada</span>
        </div>
    </div>

    <button onclick="addToCart()" class="btn-comprar-lg" style="background: var(--gold); color: black; border: none; cursor: pointer; width: 100%;">Adicionar ao Carrinho</button>
</div>

<script>
    // ... (mantenha os dadosProdutos de antes) ...

    function addToCart() {
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');
        const produto = dadosProdutos[id];
        
        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        cart.push({ id: id, nome: produto.nome, preco: produto.preco, gb: produto.gb });
        localStorage.setItem('cart', JSON.stringify(cart));
        
        alert('Produto adicionado ao carrinho!');
        window.location.href = 'index.html';
    }
</script>
