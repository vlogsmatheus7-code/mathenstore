<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes do Produto | MTH STORE</title>
    <style>
        :root { --gold: #d4af37; }

        /* FUNDO FIXO IGUAL À INDEX */
        html, body {
            margin: 0; padding: 0; min-height: 100vh;
            background-image: url('https://raw.githubusercontent.com/vlogsmatheus7-code/mathenstore/main/fundo-preto-premium.jpg') !important;
            background-size: cover; background-position: center; background-attachment: fixed;
            background-color: #000; color: white; font-family: 'Segoe UI', sans-serif;
        }

        header { 
            background: rgba(0, 0, 0, 0.9); padding: 20px 0; text-align: center;
            border-bottom: 1px solid var(--gold); backdrop-filter: blur(10px);
        }

        .container { max-width: 600px; margin: 20px auto; padding: 20px; text-align: center; }

        /* GALERIA DE FOTOS */
        .main-img-container { 
            background: rgba(255,255,255,0.05); border-radius: 20px; 
            padding: 20px; border: 1px solid rgba(212, 175, 55, 0.3);
            margin-bottom: 20px; backdrop-filter: blur(15px);
        }
        #p-img-principal { width: 100%; max-height: 400px; object-fit: contain; }

        .thumbnails { display: flex; justify-content: center; gap: 10px; margin-top: 15px; }
        .thumb { 
            width: 60px; height: 60px; border: 1px solid rgba(212, 175, 55, 0.3); 
            border-radius: 8px; cursor: pointer; object-fit: cover; opacity: 0.6; transition: 0.3s;
        }
        .thumb:hover, .thumb.active { opacity: 1; border-color: var(--gold); }

        /* INFO DO PRODUTO */
        .info-card { 
            background: rgba(0,0,0,0.6); padding: 25px; border-radius: 20px; 
            border: 1px solid rgba(212, 175, 55, 0.1); margin-top: 20px;
        }
        h1 { font-size: 1.8rem; margin: 10px 0; text-transform: uppercase; }
        .preco { font-size: 2.2rem; color: var(--gold); font-weight: bold; margin: 15px 0; }
        
        .btn-comprar { 
            display: block; background: #25d366; color: white; padding: 20px; 
            text-decoration: none; border-radius: 50px; font-weight: bold; 
            font-size: 1.2rem; margin-top: 25px; transition: 0.3s;
        }
        .btn-comprar:hover { transform: scale(1.05); background: #1ebd5b; }
        .voltar { display: inline-block; margin-top: 20px; color: #999; text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>

    <header>
        <a href="index.html"><img src="logo-dourado.png" width="120"></a>
    </header>

    <div class="container">
        <div class="main-img-container">
            <img id="p-img-principal" src="" alt="Produto">
            <div class="thumbnails" id="galeria-fotos">
                </div>
        </div>

        <div class="info-card">
            <h1 id="p-nome">Carregando...</h1>
            <div id="p-armazenamento" style="color: var(--gold); font-weight: bold;"></div>
            <div class="preco" id="p-preco"></div>
            <p id="p-desc" style="color: #ccc; line-height: 1.6;">Garantia Apple de 1 ano e nota fiscal inclusa.</p>
            
            <a href="#" id="link-whatsapp" target="_blank" class="btn-comprar">Confirmar Pedido no WhatsApp</a>
            <a href="index.html" class="voltar">← Voltar para a vitrine</a>
        </div>
    </div>

    <script>
        // BANCO DE DADOS DOS PRODUTOS
        const produtos = {
            '16promax': {
                nome: "iPhone 16 Pro Max",
                preco: "R$ 5.400",
                gb: "512GB",
                fotos: [
                    "https://store.storeimages.cdn-apple.com/4982/as-images.apple.com/is/iphone-16-pro-model-unselect-gallery-2-202409?wid=1000&fmt=p-jpg",
                    "https://store.storeimages.cdn-apple.com/4982/as-images.apple.com/is/iphone-16-pro-model-unselect-gallery-1-202409?wid=1000&fmt=p-jpg"
                ]
            },
            '15promax': {
                nome: "iPhone 15 Pro Max",
                preco: "R$ 4.400",
                gb: "512GB",
                fotos: [
                    "https://store.storeimages.cdn-apple.com/4982/as-images.apple.com/is/iphone-15-pro-finish-select-202309-6-7inch-naturaltitanium?wid=1000&fmt=p-jpg",
                    "https://store.storeimages.cdn-apple.com/4982/as-images.apple.com/is/iphone-15-pro-finish-select-202309-6-7inch-bluetitanium?wid=1000&fmt=p-jpg"
                ]
            }
            // Adicione os outros IDs (14promax, 13promax, etc) seguindo a mesma lógica
        };

        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        const p = produtos[id];

        if(p) {
            document.getElementById('p-nome').innerText = p.nome;
            document.getElementById('p-preco').innerText = p.preco;
            document.getElementById('p-armazenamento').innerText = p.gb;
            document.getElementById('p-img-principal').src = p.fotos[0];
            
            // Gerar as miniaturas
            const galeria = document.getElementById('galeria-fotos');
            p.fotos.forEach((foto, index) => {
                const img = document.createElement('img');
                img.src = foto;
                img.className = 'thumb' + (index === 0 ? ' active' : '');
                img.onclick = function() {
                    document.getElementById('p-img-principal').src = foto;
                    document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
                    this.classList.add('active');
                };
                galeria.appendChild(img);
            });

            // Link do WhatsApp dinâmico
            const msg = `Olá! Tenho interesse no ${p.nome} de ${p.gb} por ${p.preco}. Está disponível?`;
            document.getElementById('link-whatsapp').href = `https://wa.me/5581985666394?text=${encodeURIComponent(msg)}`;
        }
    </script>
</body>
</html>
