<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes | MathenStore</title>
    <style>
        :root { --gold: #d4af37; --dark-bg: #050505; }
        body { margin: 0; padding: 0; background-color: var(--dark-bg); color: white; font-family: sans-serif; }
        header { padding: 20px; border-bottom: 1px solid rgba(212, 175, 55, 0.2); display: flex; align-items: center; background: #000; }
        .btn-voltar { text-decoration: none; color: var(--gold); font-weight: bold; font-size: 1.2rem; margin-right: 20px; }
        .container { max-width: 600px; margin: 20px auto; padding: 0 15px; }
        .galeria-container { background: #111; border-radius: 15px; padding: 15px; border: 1px solid #222; margin-bottom: 20px; }
        .foto-principal-box { width: 100%; height: 300px; display: flex; align-items: center; justify-content: center; background: #000; border-radius: 10px; overflow: hidden; margin-bottom: 10px; }
        .foto-principal { max-width: 100%; max-height: 100%; object-fit: contain; }
        .miniaturas { display: flex; gap: 10px; overflow-x: auto; }
        .miniatura { width: 60px; height: 60px; border-radius: 8px; border: 2px solid #333; cursor: pointer; opacity: 0.6; }
        .miniatura.active { border-color: var(--gold); opacity: 1; }
        .detalhes-box { background: #111; border-radius: 15px; padding: 20px; border: 1px solid #222; }
        .valor-lg { font-size: 2rem; font-weight: bold; color: white; display: block; margin: 10px 0; }
        .btn-add { display: block; width: 100%; padding: 18px; background: var(--gold); color: black; border: none; border-radius: 35px; font-weight: bold; font-size: 1.1rem; cursor: pointer; margin-top: 20px; }
        .pagamento-info { margin-top: 20px; border-top: 1px solid #222; padding-top: 15px; font-size: 0.85rem; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; color: #aaa; }
    </style>
</head>
<body>
<header><a href="index.html" class="btn-voltar">&#10229;</a><div style="font-weight:bold">MATHEN STORE</div></header>
<div class="container">
    <div class="galeria-container">
        <div class="foto-principal-box"><img id="fotoPrincipal" src="" class="foto-principal"></div>
        <div id="miniaturas" class="miniaturas"></div>
    </div>
    <div class="detalhes-box">
        <h1 id="productTitle" style="margin:0; font-size:1.5rem"></h1>
        <span id="tagGb" style="color:var(--gold); border:1px solid var(--gold); padding:2px 8px; border-radius:5px; font-size:0.8rem"></span>
        <span id="productPrice" class="valor-lg"></span>
        <div class="pagamento-info">
            <span>✅ PIX (Desconto)</span><span>💳 Crédito 12x</span><span>💵 Dinheiro</span><span>🔄 Aceitamos Troca</span>
        </div>
        <button onclick="addToCart()" class="btn-add">Adicionar ao Carrinho</button>
    </div>
</div>
<script>
    const dadosProdutos = {
        '16promax': { nome: 'iPhone 16 Pro Max', gb: '512GB', preco: '5.400,00', fotos: ['https://store.storeimages.cdn-apple.com/4982/as-images.apple.com/is/iphone-16-pro-model-unselect-gallery-2-202409?wid=1000&fmt=p-jpg', 'https://via.placeholder.com/400?text=Foto+2'] },
        '15promax': { nome: 'iPhone 15 Pro Max', gb: '512GB', preco: '4.400,00', fotos: ['https://store.storeimages.cdn-apple.com/4982/as-images.apple.com/is/iphone-15-pro-finish-select-202309-6-7inch-naturaltitanium?wid=1000&fmt=p-jpg'] },
        '14promax': { nome: 'iPhone 14 Pro Max', gb: '256GB', preco: '3.600,00', fotos: ['https://store.storeimages.cdn-apple.com/4982/as-images.apple.com/is/iphone-14-pro-finish-unselect-gallery-1-202209?wid=1000&fmt=p-jpg'] },
        '13promax': { nome: 'iPhone 13 Pro Max', gb: '256GB', preco: '3.100,00', fotos: ['https://store.storeimages.cdn-apple.com/4982/as-images.apple.com/is/iphone-13-pro-max-silver-select?wid=1000&fmt=p-jpg'] },
        '14plus': { nome: 'iPhone 14 Plus', gb: '128GB', preco: '2.500,00', fotos: ['https://store.storeimages.cdn-apple.com/4982/as-images.apple.com/is/iphone-14-finish-select-202209-6-7inch-starlight?wid=1000&fmt=p-jpg'] },
        'iphone13': { nome: 'iPhone 13', gb: '128GB', preco: '2.100,00', fotos: ['https://store.storeimages.cdn-apple.com/4982/as-images.apple.com/is/iphone-13-finish-select-202207-midnight?wid=1000&fmt=p-jpg'] }
    };

    const urlParams = new URLSearchParams(window.location.search);
    const id = urlParams.get('id');
    const p = dadosProdutos[id];

    document.getElementById('productTitle').innerText = p.nome;
    document.getElementById('tagGb').innerText = p.gb;
    document.getElementById('productPrice').innerText = 'R$ ' + p.preco;
    const imgPrin = document.getElementById('fotoPrincipal');
    imgPrin.src = p.fotos[0];

    p.fotos.forEach((f, i) => {
        const img = document.createElement('img');
        img.src = f; img.className = 'miniatura' + (i===0?' active':'');
        img.onclick = () => { 
            imgPrin.src = f; 
            document.querySelectorAll('.miniatura').forEach(m=>m.classList.remove('active'));
            img.classList.add('active');
        };
        document.getElementById('miniaturas').appendChild(img);
    });

    function addToCart() {
        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        cart.push({ nome: p.nome, preco: p.preco, gb: p.gb });
        localStorage.setItem('cart', JSON.stringify(cart));
        alert('Adicionado!'); window.location.href = 'index.html';
    }
</script>
</body>
</html>
