<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Carrinho | MathenStore</title>
    <style>
        :root { --gold: #d4af37; }
        body { background: #050505; color: white; font-family: 'Segoe UI', sans-serif; padding: 20px; margin: 0; }
        
        .container { max-width: 500px; margin: 20px auto; }
        
        h2 { border-bottom: 1px solid var(--gold); padding-bottom: 15px; text-transform: uppercase; letter-spacing: 2px; }

        .item-cart { 
            background: #111; 
            padding: 15px; 
            border-radius: 12px; 
            margin-bottom: 12px; 
            border: 1px solid #222; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }

        .item-info b { display: block; font-size: 1.1rem; }
        .item-info small { color: var(--gold); font-weight: bold; }

        .total-box { text-align: right; margin: 20px 0; padding: 15px; border-top: 1px solid #333; }
        .total-box span { font-size: 1.8rem; color: var(--gold); font-weight: bold; }

        .pagamento-box { background: #111; padding: 20px; border-radius: 15px; border: 1px solid #222; margin-bottom: 20px; }
        .pagamento-box label { display: block; margin-bottom: 10px; font-size: 0.9rem; color: #888; }
        
        select { 
            width: 100%; 
            padding: 12px; 
            background: #222; 
            color: white; 
            border: 1px solid var(--gold); 
            border-radius: 8px; 
            outline: none;
            font-size: 1rem;
        }

        .btn-checkout { 
            display: block; 
            width: 100%; 
            padding: 20px; 
            background: #25d366; 
            color: white; 
            text-align: center; 
            border-radius: 40px; 
            text-decoration: none; 
            font-weight: bold; 
            font-size: 1.2rem;
            transition: 0.3s;
            box-sizing: border-box;
        }

        .btn-checkout:hover { background: #1eb954; transform: scale(1.02); }

        .btn-limpar { 
            background: none; 
            border: none; 
            color: #ff4444; 
            width: 100%; 
            margin-top: 25px; 
            cursor: pointer; 
            font-size: 0.9rem;
            text-decoration: underline;
        }

        .voltar { display: block; text-align: center; color: var(--gold); margin-top: 20px; text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="container">
    <h2>🛒 Seu Carrinho</h2>
    
    <div id="listaCarrinho">
        </div>

    <div class="total-box">
        <p style="margin:0; font-size: 0.9rem; color: #888;">Total do Pedido:</p>
        <span id="valorTotal">R$ 0,00</span>
    </div>

    <div class="pagamento-box">
        <label>Selecione a forma de pagamento:</label>
        <select id="metodoPagamento">
            <option value="PIX">PIX (À vista com desconto)</option>
            <option value="Cartão de Crédito">Cartão de Crédito (Até 12x)</option>
            <option value="Dinheiro / Espécie">Dinheiro / Espécie</option>
        </select>
    </div>

    <a href="#" onclick="enviarWhatsApp()" class="btn-checkout">Finalizar no WhatsApp</a>
    
    <button onclick="esvaziarCarrinho()" class="btn-limpar">Limpar todos os itens</button>
    
    <a href="index.html" class="voltar">← Continuar Comprando</a>
</div>

<script>
    function carregarItens() {
        const cart = JSON.parse(localStorage.getItem('cart')) || [];
        const lista = document.getElementById('listaCarrinho');
        const totalExibicao = document.getElementById('valorTotal');
        let somaTotal = 0;

        if (cart.length === 0) {
            lista.innerHTML = '<p style="text-align:center; padding: 40px 0; color: #555;">O carrinho está vazio...</p>';
            totalExibicao.innerText = 'R$ 0,00';
            return;
        }

        lista.innerHTML = '';
        cart.forEach((item, index) => {
            lista.innerHTML += `
                <div class="item-cart">
                    <div class="item-info">
                        <b>${item.nome}</b>
                        <small>${item.gb}</small>
                    </div>
                    <div style="font-weight: bold;">R$ ${item.preco}</div>
                </div>
            `;
            // Converte preço string para número
            let precoNumerico = parseFloat(item.preco.replace('.', '').replace(',', '.'));
            somaTotal += precoNumerico;
        });

        totalExibicao.innerText = 'R$ ' + somaTotal.toLocaleString('pt-BR', {minimumFractionDigits: 2});
    }

    function enviarWhatsApp() {
        const cart = JSON.parse(localStorage.getItem('cart')) || [];
        if (cart.length === 0) {
            alert('Adicione algo ao carrinho primeiro!');
            return;
        }

        const metodo = document.getElementById('metodoPagamento').value;
        let mensagem = '*NOVO PEDIDO - MATHEN STORE*%0A%0A';
        
        cart.forEach(item => {
            mensagem += `• *${item.nome}* (${item.gb}) - R$ ${item.preco}%0A`;
        });

        mensagem += `%0A*Forma de Pagamento:* ${metodo}`;
        mensagem += `%0A%0A_Aguardando confirmação de disponibilidade._`;

        window.location.href = `https://wa.me/5581985666394?text=${mensagem}`;
    }

    function esvaziarCarrinho() {
        if(confirm('Deseja realmente limpar seu carrinho?')) {
            localStorage.removeItem('cart');
            carregarItens();
        }
    }

    // Inicia a página carregando os dados
    carregarItens();
</script>

</body>
</html>
