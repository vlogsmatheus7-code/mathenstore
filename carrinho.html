<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTH STORE | Meu Carrinho</title>
    <style>
        :root { --gold: #d4af37; }
        html, body {
            margin: 0; padding: 0; min-height: 100vh;
            background-image: url('https://raw.githubusercontent.com/vlogsmatheus7-code/mathenstore/main/fundo-preto-premium.jpg') !important;
            background-size: cover; background-position: center; background-attachment: fixed;
            background-color: #000; color: white; font-family: 'Segoe UI', sans-serif;
        }
        header { background: rgba(0, 0, 0, 0.9); padding: 20px 0; text-align: center; border-bottom: 1px solid var(--gold); backdrop-filter: blur(10px); }
        .container { max-width: 600px; margin: 20px auto; padding: 20px; }
        .cart-item { display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; margin-bottom: 10px; border: 1px solid rgba(212, 175, 55, 0.1); }
        .item-info h3 { margin: 0; font-size: 1rem; }
        .item-info span { color: var(--gold); font-size: 0.9rem; }
        .btn-remove { background: #ff4444; color: white; border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; }
        .resumo { background: rgba(0,0,0,0.7); padding: 20px; border-radius: 20px; border: 1px solid var(--gold); margin-top: 30px; text-align: center; }
        .total-valor { font-size: 1.8rem; font-weight: bold; color: var(--gold); margin: 10px 0; }
        .aviso-juros { color: #ff9999; font-size: 0.8rem; margin-bottom: 20px; display: block; }
        .btn-finalizar { display: block; background: #25d366; color: white; padding: 18px; text-decoration: none; border-radius: 50px; font-weight: bold; transition: 0.3s; }
        .voltar { display: inline-block; margin-top: 20px; color: #999; text-decoration: none; }
    </style>
</head>
<body>
    <header><a href="index.html"><img src="logo-dourado.png" width="120"></a></header>
    <div class="container">
        <h2 style="text-align: center; text-transform: uppercase; letter-spacing: 2px;">Meu Carrinho</h2>
        <div id="lista-carrinho"></div>
        <div class="resumo">
            <div>Total à vista:</div>
            <div class="total-valor" id="total-carrinho">R$ 0,00</div>
            <span class="aviso-juros">*No cartão, acréscimo por conta dos juros da maquineta.</span>
            <a href="#" onclick="finalizarPedido()" class="btn-finalizar">Finalizar via WhatsApp</a>
        </div>
        <div style="text-align: center;"><a href="index.html" class="voltar">← Continuar comprando</a></div>
    </div>
    <script>
        function carregarCarrinho() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            const lista = document.getElementById('lista-carrinho');
            let total = 0;
            lista.innerHTML = '';
            cart.forEach((item, index) => {
                // LIMPEZA DO PREÇO PARA EVITAR O NaN
                const precoLimpo = parseFloat(item.preco.replace('R$', '').replace('.', '').replace(',', '.').trim());
                total += precoLimpo;
                lista.innerHTML += `
                    <div class="cart-item">
                        <div class="item-info"><h3>${item.nome}</h3><span>${item.gb} - ${item.preco}</span></div>
                        <button class="btn-remove" onclick="removerItem(${index})">Remover</button>
                    </div>`;
            });
            document.getElementById('total-carrinho').innerText = `R$ ${total.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}`;
        }
        function removerItem(index) {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            cart.splice(index, 1);
            localStorage.setItem('cart', JSON.stringify(cart));
            carregarCarrinho();
        }
        function finalizarPedido() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            if (cart.length === 0) return alert("Vazio!");
            let texto = "🚀 *Novo Pedido - MTH STORE*\n\n";
            cart.forEach(item => { texto += `• ${item.nome} (${item.gb}) - ${item.preco}\n`; });
            texto += `\n💰 *Total à vista:* ${document.getElementById('total-carrinho').innerText}`;
            window.open(`https://wa.me/5581985666394?text=${encodeURIComponent(texto)}`);
        }
        carregarCarrinho();
    </script>
</body>
</html>
