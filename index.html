<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathenStore - iPhones</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f5f5f7;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* Cabeçalho Profissional */
        .main-header {
            background-color: #1d1d1f;
            padding: 15px 0;
            color: white;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-container {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            margin: 0;
        }

        .logo span {
            color: #0071e3;
        }

        nav a {
            color: #f5f5f7;
            text-decoration: none;
            margin-left: 20px;
            font-size: 0.9rem;
            transition: color 0.3s;
        }

        nav a:hover {
            color: #0071e3;
        }

        .btn-header {
            background-color: #0071e3;
            padding: 8px 18px;
            border-radius: 20px;
            font-weight: 500;
            transition: opacity 0.3s;
        }

        /* Seção do Produto */
        .add-phone {
            padding: 60px 20px;
            text-align: center;
        }

        .produto-card {
            background: #fff;
            border-radius: 22px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
            max-width: 340px;
            margin: 0 auto;
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .produto-card:hover {
            transform: translateY(-10px);
        }

        .produto-imagem img {
            width: 100%;
            height: auto;
            display: block;
            background-color: #fafafa;
        }

        .produto-info {
            padding: 30px;
        }

        .produto-info h3 {
            margin: 0;
            font-size: 1.6rem;
            color: #1d1d1f;
            letter-spacing: -0.5px;
        }

        .capacidade {
            color: #86868b;
            margin: 8px 0;
            font-size: 1.1rem;
        }

        .preco {
            font-size: 1.9rem;
            font-weight: bold;
            color: #1d1d1f;
            margin: 25px 0;
        }

        /* Botão WhatsApp */
        .botao-whatsapp {
            display: block;
            background-color: #25d366;
            color: white;
            text-decoration: none;
            padding: 16px;
            border-radius: 14px;
            font-weight: bold;
            font-size: 1.1rem;
            transition: background 0.3s;
        }

        .botao-whatsapp:hover {
            background-color: #128c7e;
        }
    </style>
</head>
<body>

    <header class="main-header">
        <div class="header-container">
            <h1 class="logo">Mathen<span>Store</span></h1>
            <nav>
                <a href="#">Início</a>
                <a href="https://wa.me/5581985666394" class="btn-header">Falar Conosco</a>
            </nav>
        </div>
    </header>

    <section class="add-phone">
        <div class="produto-card">
            <div class="produto-imagem">
                <!-- Certifique-se de subir a imagem iphone14plus.jpg para o GitHub -->
                <img src="iphone14plus.jpg" alt="iPhone 14 Plus">
            </div>
            <div class="produto-info">
                <h3>iPhone 14 Plus</h3>
                <p class="capacidade">256GB • Novo Lacrado</p>
                <div class="preco">R$ 2.600,00</div>
                <a href="https://wa.me/5581985666394?text=Olá!+Tenho+interesse+no+iPhone+14+Plus+da+loja" target="_blank" class="botao-whatsapp">
                    Comprar via WhatsApp
                </a>
            </div>
        </div>
    </section>

</body>
</html>
