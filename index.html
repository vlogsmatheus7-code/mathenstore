<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTH STORE | Premium iPhones</title>
    <style>
        :root { --gold: #d4af37; }

        /* FUNDO PRETO TOTAL E FIXO */
        html, body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            width: 100%;
            /* Usando uma textura de fibra de carbono/mármore escuro neutra */
            background-image: url('https://www.transparenttextures.com/patterns/dark-matter.png'), 
                              radial-gradient(circle at center, #1a1a1a 0%, #000000 100%) !important;
            background-attachment: fixed !important;
            background-color: #000 !important;
            color: white;
            font-family: 'Segoe UI', sans-serif;
        }

        /* Camada de reforço para garantir que o fundo seja fosco e luxuoso */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7); 
            z-index: -1;
        }

        header { 
            background: rgba(0, 0, 0, 0.9); 
            padding: 40px 0; 
            text-align: center;
            border-bottom: 2px solid var(--gold); 
            backdrop-filter: blur(15px);
        }

        .logo-img {
            max-width: 200px;
            filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.6));
        }

        .container { max-width: 850px; margin: 30px auto; padding: 0 15px 100px 15px; }

        /* CARDS COM EFEITO DE VIDRO (GLASSMORPHISM) */
        .produto-link { text-decoration: none; color: white; display: block; margin-bottom: 18px; }
        .produto-row { 
            display: flex; 
            align-items: center; 
            background: rgba(25, 25, 25, 0.6) !important; 
            border: 1px solid rgba(212, 175, 55, 0.2); 
            border-radius: 20px; 
            padding: 22px; 
            transition: 0.4s;
            backdrop-filter: blur(20px); /* Deixa ver o fundo de leve mas focado */
            -webkit-backdrop-filter: blur(20px);
        }
        .produto-row:hover { 
            border-color: var(--gold); 
            transform: translateY(-5px);
            background: rgba(40, 40, 40, 0.8) !important;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .img-box { 
            width: 95px; height: 95px; margin-right: 20px; 
            background: #000; border-radius: 15px; 
            display: flex; align-items: center; justify-content: center; overflow: hidden; flex-shrink: 0; 
        }
        .img-box img { width: 110%; object-fit: contain; }

        .info-box { flex-grow: 1; border-right: 1px solid rgba(212, 175, 55, 0.1); padding-right: 15px; }
        .info-box h3 { margin: 0; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 1px; }
        .tag-gb { 
            display: inline-block; border: 1px solid var(--gold); color: var(--gold); 
            font-size: 0.7rem; padding: 4px 12px; border-radius: 6px; margin-top: 10px; font-weight: bold;
        }

        .price-box { min-width: 130px; text-align: right; padding-left: 15px; }
        .valor { font-size: 1.4rem; font-weight: bold; color: #fff; }

        /* BOTÕES SOCIAIS */
        .social-container { display: flex; flex-direction: column; align-items: center; gap: 15px; margin-top: 50px; }
        .social-btn { 
            display: flex; align-items: center; justify-content: center; 
            width: 100%; max-width: 400px; padding: 20px; border-radius: 50px; 
            text-decoration: none; font-weight: bold; font-size: 1.1rem; transition: 0.3s; 
        }
        .btn-wa { background-color: #25d366; color: white; }
        .btn-ig { background: linear-gradient(45deg, #f09433, #bc1888); color: white; }
    </style>
</head>
<body>

<header>
    <img src="logo-dourado.png" alt="MTH STORE" class="logo-img">
    <div style="color: var(--gold); font-size: 0.65rem; letter-spacing: 5px; margin-top: 15px; text-transform: uppercase;"> Apple Premium Specialist</div>
</header>
