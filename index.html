<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTH STORE | Premium iPhones</title>
    <style>
        :root { --gold: #d4af37; }
        body { 
            margin: 0; padding: 0; 
            background-color: #050505;
            color: white; font-family: 'Segoe UI', sans-serif; 
        }
        
        /* HEADER REFEITO - FORÇANDO VISIBILIDADE */
        header { 
            background-color: #000 !important; 
            padding: 30px 0; 
            border-bottom: 2px solid var(--gold); 
            text-align: center;
            display: block !important;
        }
        .logo-text {
            color: var(--gold) !important;
            font-size: 2.2rem;
            font-family: 'Times New Roman', serif;
            letter-spacing: 5px;
            margin: 0;
            text-transform: uppercase;
            font-weight: bold;
        }
        .logo-text span {
            color: #ffffff !important;
            font-family: sans-serif;
            font-size: 1.2rem;
            letter-spacing: 2px;
            font-weight: 100;
        }
        .sub-logo {
            color: var(--gold);
            font-size: 0.7rem;
            letter-spacing: 4px;
            margin-top: 5px;
            text-transform: uppercase;
        }

        .container { max-width: 800px; margin: 20px auto; padding: 0 15px; }

        .produto-link { text-decoration: none; color: white; display: block; margin-bottom: 12px; }
        .produto-row { 
            display: flex; align-items: center; background: #111; 
            border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 15px; 
            padding: 15px; transition: 0.3s; 
        }
        .produto-row:hover { border-color: var(--gold); transform: scale(1.02); }

        .img-box { 
            width: 70px; height: 70px; margin-right: 15px; 
            background: #000; border-radius: 10px; 
            display: flex; align-items: center; justify-content: center; overflow: hidden; flex-shrink: 0; 
        }
        .img-box img { width: 130%; object-fit: contain; }
        .info-box { flex-grow: 1; border-right: 1px solid rgba(212, 175, 55, 0.2); padding-right: 10px; }
        .info-box h3 { margin: 0; font-size: 1rem; text-transform: uppercase; letter-spacing: 1px; }
        .tag-gb { 
            display: inline-block; border: 1px solid var(--gold); color: var(--gold); 
            font-size: 0.6rem; padding: 2px 8px; border-radius: 4px; margin-top: 5px; font-weight: bold;
        }
        .price-box { min-width: 110px; text-align: right; padding-left: 10px; }
        .valor { font-size: 1.2rem; font-weight: bold; color: white; }

        .feedback-section { 
            margin: 50px auto 30px; text-align: center; 
            background: rgba(212, 175, 55, 0.05); border-radius: 20px; 
            padding: 25px; border: 1px dashed rgba(212, 175, 55, 0.3); 
        }
        .stars { color: var(--gold); font-size: 1.2rem; margin-bottom: 10px; }
        .feedback-text { font-style: italic; font-size: 0.95rem; color: #ccc; line-height: 1.6; margin: 0; }
        .feedback-author { display: block; margin-top: 10px; font-weight: bold; color: var(--gold); text-transform: uppercase; font-size: 0.75rem; letter-spacing: 1px; }

        .social-container { 
            display: flex; flex-direction: column; align-items: center; 
            gap: 12px; margin: 30px auto 100px; max-width: 350px; 
        }
        .social-btn { 
            display: flex; align-items: center; justify-content: center; 
            width: 100%; padding: 18px 0; border-radius: 35px; 
            text-decoration: none; font-weight: bold; font-size: 1rem; transition: 0.3s; 
        }
        .btn-wa { background-color: #25d366; color: white; }
        .btn-ig { background: linear-gradient(45deg, #f09433, #bc1888); color: white; }

        .cart-float { 
            position: fixed; bottom: 30px; right: 30px; 
            background: var(--gold); color: black; width: 60px; height: 60px; 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            font-size: 1.5rem; text-decoration: none; box-shadow: 0 8px 20px rgba(0,0,0,0.5); z-index: 999; 
        }
        .cart-count { 
            position: absolute; top: 0; right: 0; background: #ff0000; color: white; 
            font-size: 0.7rem; width: 22px; height: 22px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; font-weight: bold; border: 2px solid black;
        }
    </style>
</head>
<body>

<header>
    <h1 class="logo-text">MTH <span>STORE</span></h1>
    <div class="sub-logo"> Apple Premium Specialist</div>
</header>

<div class="container">
    <a href="produto.html?id=16promax" class="produto-link">
        <div class="produto-row">
            <div class="img-box"><img src="https://store.storeimages.cdn-apple.com/4982/as-images.apple.com/is/iphone-16-pro-model-unselect-gallery-2-202409?wid=1000&fmt=p-jpg"></div>
            <div class="info-box"><h3>iPhone 16 Pro Max</h3><span class="tag-gb">512GB</span></div>
            <div class="price-box"><span class="valor">R$ 5.400</span></div>
        </div>
    </a>
    
    <a href="produto.html?id=15promax" class="produto-link">
        <div class="produto-row">
            <div class="img-box"><img src="https://store.storeimages.cdn-apple.com/4982/as-images.apple.com/is/iphone-15-pro-finish-select-202309-6-7inch-naturaltitanium?wid=1000&fmt=p-jpg"></div>
            <div class="info-box"><h3>iPhone 15 Pro Max</h3><span class="tag-gb">512GB</span></div>
            <div class="price-box"><span class="valor">R$ 4.400</span></div>
        </div>
    </a>

    <a href="produto.html?id=14promax" class="produto-link">
        <div class="produto-row">
            <div class="img-box"><img src="https://store.storeimages.cdn-apple.com/4982/as-images.apple.com/is/iphone-14-pro-finish-unselect-gallery-1-202209?wid=1000&fmt=p-jpg"></div>
            <div class="info-box"><h3>iPhone 14 Pro Max</h3><span class="tag-gb">256GB</span></div>
            <div class="price-box"><span class="valor">R$ 3.600</span></div>
        </div>
    </a>

    <div class="social-container">
        <a href="https://wa.me/5581985666394" target="_blank" class="social-btn btn-wa">Chamar no WhatsApp</a>
        <a href="https://www.instagram.com/mathenstore/" target="_blank" class="social-btn btn-ig">Acompanhar Instagram</a>
    </div>
</div>

<a href="carrinho.html" class="cart-float">
    🛒 <span id="cartCount" class="cart-count">0</span>
</a>

<script>
    function updateCartCount() {
        const cart = JSON.parse(localStorage.getItem('cart')) || [];
        document.getElementById('cartCount').innerText = cart.length;
    }
    updateCartCount();
</script>
</body>
</html>
