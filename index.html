<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathenStore - iPhones</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f5f5f7;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        .main-header {
            background-color: #1d1d1f;
            padding: 15px 0;
            color: white;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-container {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }

        .logo { font-size: 1.5rem; font-weight: bold; margin: 0; }
        .logo span { color: #0071e3; }

        .btn-header {
            background-color: #0071e3;
            padding: 8px 18px;
            border-radius: 20px;
            color: white;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
        }

        /* Grade de Produtos */
        .container {
            max-width: 1100px;
            margin: 40px auto;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .produto-card {
            background: #fff;
            border-radius: 22px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
            overflow: hidden;
            transition: transform 0.3s ease;
            text-align: center;
        }

        .produto-card:hover { transform: translateY(-10px); }

        .produto-imagem img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            background-color: #eee;
        }

        .produto-info { padding: 25px; }
        .produto-info h3 { margin: 0; font-size: 1.4rem; color: #1d1d1f; }
        .capacidade { color: #86868b; margin: 8px 0; }
        .preco { font-size: 1.7rem; font-weight: bold; color: #1d1d1f; margin: 20px 0; }

        .botao-whatsapp {
            display: block;
            background-color: #25d366;
            color: white;
            text-decoration: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: bold;
            transition: background 0.3s;
        }

        .botao-whatsapp:hover { background-color: #128c7e; }
    </style>
</head>
<body>

    <header class="main-header">
        <div class="header-container">
            <h1 class="logo">Mathen<span>Store</span></h1>
            <a href="https://wa.me/5581985666394" class="btn-header">WhatsApp</a>
        </div>
    </header>

    <div class="container">
        
        <div class="produto-card">
            <div class="produto-imagem">
                <img src="iphone14plus.jpg" alt="iPhone 14 Plus">
            </div>
            <div class="produto-info">
                <h3>iPhone 14 Plus</h3>
                <p class="capacidade">256GB • seminovo</p>
                <div class="preco">R$ 2.600,00</div>
                <a href="https://wa.me/5581985666394?text=Tenho+interesse+no+iPhone+14+Plus" class="botao-whatsapp">Comprar</a>
            </div>
        </div>

        <div class="produto-card">
            <div class="produto-imagem">
                <img src="iphone13.jpg" alt="iPhone 13">
            </div>
            <div class="produto-info">
                <h3>iPhone 15 pro max</h3>
                <p class="capacidade">512GB • seminovo</p>
                <div class="preco">R$ 4.599,00</div>
                <a href="https://wa.me/5581985666394?text=Tenho+interesse+no+iPhone+13" class="botao-whatsapp">Comprar</a>
            </div>
        </div>

        <div class="produto-card">
            <div class="produto-imagem">
                <img src="iphone15pro.jpg" alt="iPhone 15 Pro">
            </div>
            <div class="produto-info">
                <h3>iPhone 14 pro max </h3>
                <p class="capacidade">256GB • Titânio</p>
                <div class="preco">R$ 3.599,00</div>
                <a href="https://wa.me/5581985666394?text=Tenho+interesse+no+iPhone+15+Pro" class="botao-whatsapp">Comprar</a>
            </div>
        </div>

    </div>

</body>
</html>
