<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathenStore | Tabela de Preços Premium</title>
    <style>
        :root {
            --gold: #d4af37;
        }

        body {
            margin: 0;
            padding: 0;
            /* O LINK ABAIXO BUSCA A FOTO QUE VOCÊ SUBIU NO SEU GITHUB */
            background-image: url('fundo.jpg');
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        /* Camada escura para dar leitura aos preços */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: -1;
        }

        header {
            padding: 50px 20px;
            text-align: center;
        }

        .logo-main {
            font-size: 2.5rem;
            font-weight: bold;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin: 0;
        }
        .logo-main span { color: var(--gold); }

        .sub-header {
            color: var(--gold);
            font-size: 1.2rem;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 5px;
        }

        .container {
            max-width: 800px;
            margin: 20px auto;
            padding: 0 15px;
        }

        .produto-row {
            display: flex;
            align-items: center;
            background: rgba(15, 15, 15, 0.7);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 15px;
            margin-bottom: 12px;
            padding: 15px;
            text-decoration: none;
            color: white;
            transition: 0.3s;
            backdrop-filter: blur(10px);
        }

        .produto-row:hover {
            border-color: var(--gold);
            transform: scale(1.02);
            background: rgba(25, 25, 25, 0.8);
        }

        .img-box {
            width: 80px; height: 80px;
            margin-right: 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
        }

        .img-box img {
            width: 130%; 
            height: 130%;
            object-fit: contain;
        }

        .info-box {
            flex-grow: 1;
            border-right: 1px solid rgba(212, 175, 55, 0.2);
            padding-right: 10px;
        }

        .info-box h3 { margin: 0; font-size: 1.1rem; text-transform: uppercase; }

        .tag-gb {
            display: inline-block;
            border: 1px solid var(--gold);
            color: var(--gold);
            font-size: 0.65rem;
            padding: 2px 8px;
            border-radius: 4px;
            margin-top: 5px;
        }

        .price-box { min-width: 130px; text-align: right; padding-left: 10px; }
        .price-label { font-size: 0.55rem; color: var(--gold); text-transform: uppercase; }
        .valor { font-size: 1.3rem; font-weight: bold; }

        .footer-info {
            text-align: center;
            margin-top: 40px;
            padding: 30px 20px;
        }

        .social-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            max-width: 350px;
            margin: 0 auto;
        }

        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 16px 0;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1rem;
            transition: 0.3s;
        }

        .btn-wpp { background-color: #25d366; color: white; }
        .btn-ig { background: linear-gradient(45deg, #f09433, #bc1888); color: white; }

        @media (max-width: 600px) {
            .logo-main { font-size: 1.8rem; }
            .produto-row { padding: 10px; }
            .img-box { width: 60px; height: 60px; }
            .valor { font-size: 1.1rem; }
            .price-box { min-width: 100px; }
        }
    </style>
</head>
<body>

<header>
    <h1 class="logo-main">MATHEN <span>STORE</span></h1>
    <div class="sub-header">Premium iPhones</div>
</header>

<div class="container">
    <a href="https://wa.me/5581985666394" target="_blank" class="produto-row">
        <div class="img-box"><img src="https://store.storeimages.cdn-apple.com/4982/as-images.apple.com/is/iphone-16-pro-model-unselect-gallery-2-202409?wid=1000&fmt=p-jpg"></div>
        <div class="info-box"><h3>iPhone 16 Pro Max</h3><span class="tag-gb">512GB</span></div>
        <div class="price-box"><span class="price-label">Venda</span><span class="valor">R$ 5.400</span></div>
    </a>

    <a href="https://wa.me/5581985666394" target="_blank" class="produto-row">
        <div class="img-box"><img src="https://store.storeimages.cdn-apple.com/4982/as-images.apple.com/is/iphone-15-pro-finish-select-202309-6-7inch-naturaltitanium?wid=1000&fmt=p-jpg"></div>
        <div class="info-box"><h3>iPhone 15 Pro Max</h3><span class="tag-gb">512GB</span></div>
        <div class="price-box"><span class="price-label">Venda</span><span class="valor">R$ 4.400</span></div>
    </a>

    <a href="https://wa.me/5581985666394" target="_blank" class="produto-row">
        <div class="img-box"><img src="https://store.storeimages.cdn-apple.com/4982/as-images.apple.com/is/iphone-14-pro-finish-unselect-gallery-1-202209?wid=1000&fmt=p-jpg"></div>
        <div class="info-box"><h3>iPhone 14 Pro Max</h3><span class="tag-gb">256GB</span></div>
        <div class="price-box"><span class="price-label">Venda</span><span class="valor">R$ 3.600</span></div>
    </a>

    <a href="https://wa.me/5581985666394" target="_blank" class="produto-row">
        <div class="img-box"><img src="https://store.storeimages.cdn-apple.com/4982/as-images.apple.com/is/iphone-13-pro-max-silver-select?wid=1000&fmt=p-jpg"></div>
        <div class="info-box"><h3>iPhone 13 Pro Max</h3><span class="tag-gb">256GB</span></div>
        <div class="price-box"><span class="price-label">Venda</span><span class="valor">R$ 3.100</span></div>
    </a>
</div>

<div class="footer-info">
    <div class="social-container">
        <a href="https://wa.me/5581985666394" target="_blank" class="social-btn btn-wpp">Falar no WhatsApp</a>
        <a href="https://www.instagram.com/mathenstore/" target="_blank" class="social-btn btn-ig">Seguir no Instagram</a>
    </div>
</div>

</body>
</html>
