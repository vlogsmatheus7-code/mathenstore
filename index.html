<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTH Store | iPhones Premium</title>
    <style>
        /* --- ESTILOS GERAIS (Identidade MTH Store) --- */
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 {
            color: #d4af37; /* Dourado Premium */
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        /* --- VITRINE DE PRODUTOS --- */
        .vitrine {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1000px;
        }

        .product-card {
            background: #111;
            border: 1px solid #333;
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            transition: 0.3s;
            text-decoration: none;
            color: white;
            cursor: pointer;
        }

        .product-card:hover {
            border-color: #d4af37;
            transform: translateY(-5px);
        }

        .product-card img {
            width: 100%;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .product-card h3 {
            margin: 10px 0;
            font-size: 1.2rem;
        }

        .price {
            color: #d4af37;
            font-weight: bold;
            font-size: 1.1rem;
        }

        /* --- SISTEMA DA GALERIA (MODAL) --- */
        .modal {
            display: none; /* Escondido por padrão */
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            overflow-y: auto;
            padding: 20px 0;
        }

        /* O "Pulo do Gato": Quando o ID é clicado, exibe o modal */
        .modal:target {
            display: block;
        }

        .modal-content {
            background: #111;
            margin: 5% auto;
            padding: 20px;
            width: 90%;
            max-width: 500px;
            border: 1px solid #d4af37;
            border-radius: 20px;
            position: relative;
            text-align: center;
        }

        .btn-fechar {
            position: absolute;
            top: 15px;
            right: 20px;
            color: #fff;
            text-decoration: none;
            font-size: 30px;
            font-weight: bold;
        }

        /* Fotos dentro da Galeria */
        .galeria-fotos {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin: 20px 0;
        }

        .galeria-fotos img {
            width: 100%;
            border-radius: 10px;
            border: 1px solid #222;
        }

        /* Botão do WhatsApp final */
        .btn-wa {
            display: inline-block;
            background-color: #25d366;
            color: white;
            padding: 15px 30px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            margin-top: 10px;
            transition: 0.3s;
        }

        .btn-wa:hover {
            background-color: #128c7e;
            transform: scale(1.05);
        }

    </style>
</head>
<body>

    <header>
        <h1>MTH STORE</h1>
        <p>Especialista em iPhones e Tecnologia</p>
    </header>

    <div class="vitrine">
        <!-- PRODUTO 1 -->
        <a href="#galeria-iphone12" class="product-card">
            <img src="https://via.placeholder.com/300x400/111/d4af37?text=iPhone+12+Pro+Max" alt="iPhone 12 Pro Max">
            <h3>iPhone 12 Pro Max</h3>
            <p class="price">R$ 3.800,00</p>
            <p style="font-size: 0.8rem; color: #888;">Clique para ver mais fotos</p>
        </a>

        <!-- Você pode adicionar mais produtos aqui seguindo o mesmo modelo -->
    </div>

    <!-- JANELA DE GALERIA (MODAL) DO IPHONE 12 -->
    <div id="galeria-iphone12" class="modal">
        <div class="modal-content">
            <a href="#" class="btn-fechar">&times;</a>
            
            <h2>iPhone 12 Pro Max</h2>
            <p style="color: #d4af37;">Confira os detalhes do aparelho:</p>

            <div class="galeria-fotos">
                <!-- Substitua os links abaixo pelas fotos reais do seu celular -->
                <img src="https://via.placeholder.com/400x500/222/fff?text=Lado+Frontal" alt="Foto 1">
                <img src="https://via.placeholder.com/400x500/222/fff?text=Lado+Traseiro" alt="Foto 2">
                <img src="https://via.placeholder.com/400x500/222/fff?text=Saude+da+Bateria" alt="Foto 3">
                <img src="https://via.placeholder.com/400x500/222/fff?text=Bordas+e+Câmera" alt="Foto 4">
            </div>

            <a href="https://wa.me/5581999999999?text=Olá,+tenho+interesse+no+iPhone+12+Pro+Max" class="btn-wa">
                FECHAR PEDIDO NO WHATSAPP
            </a>
        </div>
    </div>

</body>
</html>
