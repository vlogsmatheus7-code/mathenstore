<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathenStore | Premium Store</title>
    <style>
        :root { --gold: #d4af37; }
        body { margin: 0; padding: 0; background-image: url('fundo.jpg'); background-attachment: fixed; background-size: cover; background-position: center; color: white; font-family: 'Segoe UI', sans-serif; }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); z-index: -1; }
        
        header { padding: 40px 20px; text-align: center; }
        .logo-main { font-size: 2.2rem; font-weight: bold; letter-spacing: 3px; text-transform: uppercase; margin: 0; }
        .logo-main span { color: var(--gold); }

        .container { max-width: 800px; margin: 20px auto; padding: 0 15px; padding-bottom: 100px; }

        .produto-row { display: flex; align-items: center; background: rgba(15, 15, 15, 0.7); border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 15px; padding: 15px; margin-bottom: 12px; backdrop-filter: blur(10px); text-decoration: none; color: white; transition: 0.3s; }
        .produto-row:hover { border-color: var(--gold); transform: scale(1.01); }

        .img-box { width: 70px; height: 70px; margin-right: 15px; background: rgba(255,255,255,0.05); border-radius: 10px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .img-box img { width: 130%; object-fit: contain; }

        .info-box { flex-grow: 1; }
        .info-box h3 { margin: 0; font-size: 1rem; text-transform: uppercase; }
        .tag-gb { display: inline-block; border: 1px solid var(--gold); color: var(--gold); font-size: 0.6rem; padding: 2px 8px; border-radius: 4px; margin-top: 5px; }

        .price-box { text-align: right; min-width: 110px; }
        .valor { font-size: 1.2rem; font-weight: bold; display: block; }
        .ver-mais { font-size: 0.7rem; color: var(--gold); text-transform: uppercase; margin-top: 5px; display: block; }

        /* BOTÃO FLUTUANTE DO CARRINHO */
        .cart-float { position: fixed; bottom: 30px; right: 30px; background: var(--gold); color: black; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; text-decoration: none; box-shadow: 0 5px 15px rgba(0,0,0,0.5); z-index: 999; }
        .cart-count { position: absolute; top: 0; right: 0; background: red; color: white; font-size: 0.7rem; width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }

        @media (max-width: 600px) { .logo-main { font-size: 1.8rem; } }
    </style>
</head>
<body>

<header>
    <h1 class="logo-main">MATHEN <span>STORE</span></h1>
</header>

<div class="container">
    <a href="produto.html?id=16promax" class="produto-row">
        <div class="img-box"><img src="https://store.storeimages.cdn-apple.com/4982/as-images.apple.com/is/iphone-16-pro-model-unselect-gallery-2-202409?wid=1000&fmt=p-jpg"></div>
        <div class="info-box"><h3>iPhone 16 Pro Max</h3><span class="tag-gb">512GB</span></div>
        <div class="price-box">
            <span class="valor">R$ 5.400</span>
            <span class="ver-mais">Ver detalhes</span>
        </div>
    </a>
    
    <a href="produto.html?id=15promax" class="produto-row">
        <div class="img-box"><img src="https://store.storeimages.cdn-apple.com/4982/as-images.apple.com/is/iphone-15-pro-finish-select-202309-6-7inch-naturaltitanium?wid=1000&fmt=p-jpg"></div>
        <div class="info-box"><h3>iPhone 15 Pro Max</h3><span class="tag-gb">512GB</span></div>
        <div class="price-box">
            <span class="valor">R$ 4.400</span>
            <span class="ver-mais">Ver detalhes</span>
        </div>
    </a>
    </div>

<a href="carrinho.html" class="cart-float">
    🛒 <span id="cartCount" class="cart-count">0</span>
</a>

<script>
    function updateCartCount() {
        const cart = JSON.parse(localStorage.getItem('cart')) || [];
        document.getElementById('cartCount').innerText = cart.length;
    }
    updateCartCount();
</script>
</body>
</html>
