<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>MathenStore</title>
    <style>
        body { margin: 0; background: #f5f5f7; font-family: sans-serif; text-align: center; }
        header { background: #1d1d1f; color: white; padding: 20px; font-size: 24px; font-weight: bold; }
        span { color: #0071e3; }
        .card { background: white; margin: 40px auto; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 300px; }
        .preco { font-size: 26px; font-weight: bold; margin: 15px 0; }
        .btn { display: block; background: #25d366; color: white; text-decoration: none; padding: 15px; border-radius: 10px; font-weight: bold; }
        img { width: 100%; border-radius: 10px; background: #eee; }
    </style>
</head>
<body>
    <header>Mathen<span>Store</span></header>
    <div class="card">
        <img src="iphone14plus.jpg" alt="iPhone 14 Plus">
        <h3>iPhone 14 Plus</h3>
        <p>256GB • Novo</p>
        <div class="preco">R$ 2.600,00</div>
        <a href="https://wa.me/5581985666394?text=Interesse+no+iPhone" class="btn">Chamar no WhatsApp</a>
    </div>
</body>
</html>
