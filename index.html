<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathenStore</title>
    <style>
        body { margin: 0; padding: 0; background-color: #f5f5f7; font-family: sans-serif; }
        header { background: #1d1d1f; color: white; padding: 15px 20px; text-align: center; position: sticky; top: 0; }
        .logo span { color: #0071e3; }
        .container { padding: 40px 20px; display: flex; justify-content: center; }
        .card { background: white; border-radius: 18px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); width: 100%; max-width: 320px; overflow: hidden; text-align: center; }
        .info { padding: 20px; }
        .preco { font-size: 24px; font-weight: bold; color: #1d1d1f; margin: 15px 0; }
        .btn { display: block; background: #25d366; color: white; text-decoration: none; padding: 12px; border-radius: 10px; font-weight: bold; }
        img { width: 100%; height: auto; display: block; background: #eee; min-height: 200px; }
    </style>
</head>
<body>

<header>
    <h1 style="margin:0; font-size: 22px;">Mathen<span>Store</span></h1>
</header>

<div class="container">
    <div class="card">
        <img src="iphone14plus.jpg" alt="iPhone 14 Plus">
        <div class="info">
            <h3 style="margin:0;">iPhone 14 Plus</h3>
            <p style="color: #666;">256GB • Novo</p>
            <div class="preco">R$ 2.600,00</div>
            <a href="https://wa.me/5581985666394?text=Tenho+interesse+no+iPhone" class="btn">Comprar no WhatsApp</a>
        </div>
    </div>
</div>

</body>
</html>
