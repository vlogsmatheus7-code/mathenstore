Vi o seu código no GitHub! O problema é que as tags estão um pouco "emboladas". Você colocou o `<style>` e o `<header>` dentro de uma `<section>`, e as tags de fechamento (como `</div>` e `</section>`) sumiram, o que faz o navegador se perder.

Aqui está o código do seu **index.html** inteirinho e corrigido. Apague tudo o que está no seu arquivo hoje e cole exatamente isto:

```html
