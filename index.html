<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTH STORE | Premium iPhones</title>
    <style>
        /* --- ESTILOS ORIGINAIS RESTAURADOS --- */
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding-bottom: 90px;
        }

        header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #d4af37;
        }

        .logo-mth {
            width: 120px; /* Ajuste conforme o tamanho da sua logo */
            margin-bottom: 10px;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 15px;
            max-width: 1200px;
            margin: auto;
        }

        .product-card {
            background: #111;
            border-radius: 12px;
            border: 1px solid #222;
            overflow: hidden;
            transition: 0.3s;
        }

        .product-card img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
        }

        .info { padding: 12px; text-align: center; }
        .price { color: #d4af37; font-weight: bold; font-size: 1.2rem; }

        .btn-carrinho {
            background: transparent;
            border: 1px solid #d4af37;
            color: #d4af37;
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }

        /* --- SISTEMA DE GALERIA QUE VOCÊ PEDIU --- */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.98);
            z-index: 9999;
            overflow-y: auto;
        }

        .modal:target { display: block; }

        .modal-content {
            max-width: 500px;
            margin: 20px auto;
            padding: 20px;
        }

        .fechar-galeria {
            color: #d4af37;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: bold;
        }

        .carrossel-detalhes {
            display: flex;
            overflow-x: auto;
            gap: 10px;
            margin: 20px 0;
            scroll-snap-type: x mandatory;
        }

        .carrossel-detalhes img {
            width: 100%;
            flex-shrink: 0;
            scroll-snap-align: start;
            border-radius: 10px;
        }

        .btn-wa-final {
            display: block;
            background: #25d366;
            color: #fff;
            text-align: center;
            padding: 15px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 20px;
        }

        /* --- CARRINHO FIXO --- */
        .footer-cart {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #000;
            border-top: 2px solid #d4af37;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <header>
        <!-- Restaurando sua Logo -->
        <img src="logo.png" alt="MTH STORE" class="logo-mth">
    </header>

    <div class="container">
        <!-- PRODUTO 1: IPHONE 12 PRO MAX -->
        <div class="product-card">
            <!-- Agora o clique na imagem abre o Modal #detalhes1 -->
            <a href="#detalhes1">
                <img src="iphone12promax.jpg" alt="iPhone 12 Pro Max">
            </a>
            <div class="info">
                <h3>iPhone 12 Pro Max</h3>
                <span class="price">R$ 3.800</span>
                <button class="btn-carrinho" onclick="add('iPhone 12 Pro Max', 3800)">+ Carrinho</button>
            </div>
        </div>

        <!-- Adicione outros produtos seguindo o mesmo padrão de ID (#detalhes2, etc) -->
    </div>

    <!-- MODAL DE GALERIA DO IPHONE 12 -->
    <div id="detalhes1" class="modal">
        <div class="modal-content">
            <a href="#" class="fechar-galeria">← Voltar</a>
            
            <div class="carrossel-detalhes">
                <!-- Coloque aqui os links das fotos extras -->
                <img src="iphone12promax.jpg" alt="Foto 1">
                <img src="iphone12-lado.jpg" alt="Foto 2">
                <img src="iphone12-bateria.jpg" alt="Foto 3">
            </div>

            <h2>iPhone 12 Pro Max</h2>
            <p>128GB | Saúde 87% | Impecável</p>
            <span class="price">R$ 3.800</span>

            <a href="https://wa.me/5581999999999?text=Quero+o+iPhone+12" class="btn-wa-final">COMPRAR NO WHATSAPP</a>
        </div>
    </div>

    <!-- BARRA DO CARRINHO -->
    <div class="footer-cart">
        <div>Total: <span id="total" style="color:#d4af37; font-weight:bold;">R$ 0</span></div>
        <a href="https://wa.me/5581999999999?text=Finalizar+Pedido" style="background:#d4af37; color:#000; padding:10px 20px; border-radius:5px; text-decoration:none; font-weight:bold;">Finalizar</a>
    </div>

    <script>
        let total = 0;
        function add(nome, preco) {
            total += preco;
            document.getElementById('total').innerText = "R$ " + total.toLocaleString('pt-BR');
            alert(nome + " adicionado!");
        }
    </script>

</body>
</html>
